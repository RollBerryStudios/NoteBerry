appId: com.rollberrystudios.noteberry
productName: NoteBerry
copyright: Copyright © 2026 RollBerry Studios

extraMetadata:
  main: dist/main/main.js
  name: noteberry
  productName: NoteBerry
  description: Rich local note taking for virtual tabletop rounds

directories:
  output: release
  buildResources: resources

files:
  - dist/main/**/*
  - dist/preload/**/*
  - dist/renderer/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!node_modules/**/{test,__tests__,tests,powered-test,example,examples}"
  - "!node_modules/.bin"
  - "!**/*.map"
  - "!src/**"
  - "!**/*.ts"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: NoteBerry
  runAfterFinish: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
  notarize: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: resources/icon.png
  category: Office
  description: Rich local note taking for virtual tabletop rounds
