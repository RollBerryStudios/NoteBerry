name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  qa:
    name: QA Gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run quality

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package Windows
        run: npx electron-builder --win nsis --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: release/*.exe
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm
      - run: npm ci
      - run: npm run build
      - name: Package Linux
        run: npx electron-builder --linux AppImage deb --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package macOS
        run: npx electron-builder --mac dmg zip --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            release/*.dmg
            release/*.zip
          retention-days: 7

  publish-release:
    name: Publish Release
    needs: [qa, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ github.event.repository.name }} ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/dist-windows/*.exe
            release-artifacts/dist-linux/*.AppImage
            release-artifacts/dist-linux/*.deb
            release-artifacts/dist-macos/*.dmg
            release-artifacts/dist-macos/*.zip
